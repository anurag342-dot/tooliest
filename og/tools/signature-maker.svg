<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Online Signature Maker</title>
  <desc id="desc">Create a handwritten digital signature for free. Draw with mouse or finger, choose a signature style, and download as transparent PNG. No signup, no.</desc>
  <defs>
    <linearGradient id="bgSignature" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accentSignature" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="signatureShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.3" />
    </filter>
    <pattern id="signatureGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#f8fafc" />
      <rect width="12" height="12" fill="#e5e7eb" />
      <rect x="12" y="12" width="12" height="12" fill="#e5e7eb" />
    </pattern>
  </defs>
  <rect width="1200" height="630" rx="36" fill="url(#bgSignature)" />
  <circle cx="1020" cy="120" r="170" fill="#8b5cf6" opacity="0.12" />
  <circle cx="154" cy="534" r="196" fill="#06b6d4" opacity="0.1" />
  <rect x="86" y="78" width="1028" height="474" rx="34" fill="rgba(15, 23, 42, 0.76)" stroke="rgba(148, 163, 184, 0.16)" filter="url(#signatureShadow)" />

  <g transform="translate(122 126)">
    <rect x="0" y="0" width="520" height="248" rx="24" fill="#111827" />
    <rect x="30" y="30" width="460" height="156" rx="18" fill="url(#signatureGrid)" stroke="#cbd5e1" />
    <path d="M102 126 Q164 64 222 108 Q246 128 286 100 Q338 62 396 118 Q426 146 462 114" fill="none" stroke="#111827" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M102 126 Q164 64 222 108 Q246 128 286 100 Q338 62 396 118 Q426 146 462 114" fill="none" stroke="url(#accentSignature)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.72" />
    <rect x="30" y="204" width="118" height="26" rx="13" fill="#1f2937" />
    <rect x="160" y="204" width="118" height="26" rx="13" fill="#1f2937" />
    <rect x="290" y="204" width="118" height="26" rx="13" fill="#1f2937" />
    <rect x="420" y="204" width="70" height="26" rx="13" fill="#1f2937" />
  </g>

  <g transform="translate(682 158)">
    <rect x="0" y="0" width="344" height="218" rx="24" fill="#ffffff" filter="url(#signatureShadow)" />
    <rect x="0" y="0" width="344" height="18" rx="24" fill="url(#accentSignature)" />
    <text x="30" y="58" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Preview in context</text>
    <line x1="30" y1="114" x2="314" y2="114" stroke="#cbd5e1" stroke-width="2" />
    <path d="M180 110 Q214 72 252 98 Q270 112 294 94" fill="none" stroke="#0f172a" stroke-width="5" stroke-linecap="round" />
    <text x="30" y="150" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">Transparent PNG, SVG, clipboard copy</text>
    <rect x="30" y="170" width="132" height="30" rx="15" fill="#ede9fe" />
    <text x="52" y="190" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#6d28d9">Invoice ready</text>
    <rect x="174" y="170" width="136" height="30" rx="15" fill="#cffafe" />
    <text x="198" y="190" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f766e">No upload</text>
  </g>

  <text x="686" y="118" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#93c5fd">PDF Tools on Tooliest</text>
  <text x="682" y="456" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">Online Signature</text>
  <text x="682" y="522" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">Maker</text>
  <text x="682" y="574" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">Draw, type, or clean up a signature and export</text>
  <text x="682" y="606" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">a transparent PNG in minutes.</text>
</svg>
